id: roundtable-chain
name: Roundtable Chain
version: v1.0
description: Minimal chain definition for multi-perspective structured discussion — 5-step core flow

steps:
  - step: 1
    name: Position Statements
    description: Each participant responds to the topic from their own perspective
    rules:
      - Each statement must begin with [Identity: Persona Name]
      - ~200 words per statement
    output: position_statements

  - step: 2
    name: Cross-Refutation
    description: Each participant must challenge at least one other participant's core argument
    rules:
      - Refutations must explicitly name the target: "I disagree with {Name}'s view, because..."
      - Refutations must target the argument itself, not the person
    output: challenge_statements

  - step: 3
    name: Reasoning Synthesis
    description: Synthesize consensus and divergence from all positions and refutations
    rules:
      - List conclusions all parties agree on
      - List points of disagreement and their root causes
    output: reasoning_synthesis

  - step: 4
    name: Consensus Adjudication
    description: Output the final conclusion — consensus first, adjudication second
    rules:
      - Consensus first, adjudication second
      - Mark unresolved disagreements as "TBD" rather than forcing consensus
    output: conclusion

  - step: 5
    name: Structured Output
    description: Output the final result in a standardized format
    rules:
      - Must include: conclusion, actionable signals, consensus matrix, blindspots, confidence
      - Actionable signals must be concrete and executable
      - At least 2 blindspots required
    output: structured_output

modes:
  quick:
    description: Quick Consensus — 1 LLM call, all steps in one prompt
    steps: [1, 2, 3, 4, 5]
    estimated_time: 30s

  deep:
    description: Deep Roundtable — 5 LLM calls, each step independent
    steps: [1, 2, 3, 4, 5]
    estimated_time: 150s

  extended:
    description: Extended Mode — Step 1 and Step 2 each split into two rounds, for complex topics
    steps: [1.1-position, 1.2-deepening, 2.1-first-refutation, 2.2-second-refutation, 3, 4, 5]
    estimated_time: 300s

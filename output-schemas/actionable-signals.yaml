id: actionable-signals
name: Actionable Signals
version: v1.0
description: Executable action items from Roundtable conclusions

schema:
  type: array
  items:
    type: object
    properties:
      id:
        type: integer
        description: Sequence number
      action:
        type: string
        description: Concrete, executable action
      expected_effect:
        type: string
        description: Expected effect
      responsible_perspective:
        type: string
        description: Responsible perspective (which persona's questioning direction it maps to)

example:
  - id: 1
    action: "Complete data cleaning and basic backtest framework setup in 2 weeks"
    expected_effect: "Rule out low-level errors in the data layer, establish verification infrastructure"
    responsible_perspective: "Munger (engineering mindset, exclude stupid failures first)"

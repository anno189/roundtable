id: blindspots-list
name: Blindspots List
version: v1.0
description: Important perspectives not covered by the Roundtable

schema:
  type: array
  min_items: 2
  items:
    type: object
    properties:
      id:
        type: integer
        description: Sequence number
      blindspot:
        type: string
        description: Description of the uncovered perspective
      severity:
        type: string
        enum: [high, medium, low]
        description: Impact level on the conclusion

example:
  - id: 1
    blindspot: "Legal and compliance risk — finding seed users for live testing involves fund management; whether compliance qualifications are needed"
    severity: "high"
  - id: 2
    blindspot: "Overfitting detection and handling — backtest passes but live testing fails is the most common failure mode in quant"
    severity: "medium"

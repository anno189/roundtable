id: consensus-matrix
name: Consensus Matrix
version: v1.0
description: Core output structure of the Roundtable — issue point × consensus level

schema:
  type: array
  items:
    type: object
    properties:
      issue_point:
        type: string
        description: Description of the issue point
      consensus_level:
        type: string
        enum: [high, medium, low]
        description: Consensus level — high = 3 persons agree, medium = 2 agree, low = each holds their own view
      consensus_direction:
        type: string
        description: Direction of consensus — the agreed-upon conclusion
      dissent_reason:
        type: string
        description: Reason for dissent — fill in "none" if there is no dissent

example:
  - issue_point: "Should we backtest before live testing"
    consensus_level: "high"
    consensus_direction: "Backtest takes priority over live verification"
    dissent_reason: "none"
  - issue_point: "Exit criteria for the backtest"
    consensus_level: "medium"
    consensus_direction: "Exit conditions need to be set"
    dissent_reason: "Specific form of exit criteria is disputed (time vs ratio vs statistical measure)"

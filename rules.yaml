id: roundtable-rules
name: Roundtable Rules
version: v1.0
description: 5 core rules for the Roundtable product — focused on user value

rules:
  - id: RR-001
    name: Identity Tagging
    description: Each statement must begin with [Identity: Persona Name]
    rationale: Users must be able to distinguish "who is saying what" — this is the basic readability guarantee for multi-perspective discussion
    enforcement: built into prompt

  - id: RR-002
    name: Mandatory Cross-Refutation
    description: At least one participant must challenge another participant's core argument
    rationale: The key distinction between a roundtable and "round-robin speeches" — counter-arguments are required, otherwise it is just a list of opinions
    enforcement: built into prompt

  - id: RR-003
    name: Structured Consensus
    description: Discussion output must include a consensus matrix (topic × consensus level)
    rationale: Users need structured conclusions, not text streams — this is the core deliverable
    enforcement: output-schema constraint

  - id: RR-006
    name: Actionable Conclusion
    description: The final conclusion must include concrete, executable action items
    rationale: Users want "what can I do", not "we analyzed a lot" — directly determines product utility
    enforcement: output-schema constraint

  - id: RR-010
    name: Explicit Blindspots
    description: Important perspectives not covered in the discussion must be listed, at least 2 items
    rationale: Users need to know "what wasn't discussed" — prevents overconfidence, key to product trust
    enforcement: output-schema constraint
